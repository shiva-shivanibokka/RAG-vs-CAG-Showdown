services:
  ollama:
    image: ollama/ollama:latest
    # Port 11434 is NOT exposed publicly — the api service reaches Ollama
    # over the internal Docker network. Never expose Ollama to the internet;
    # it has no authentication.
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  # Pulls the model into Ollama's volume before the api starts.
  # Runs once and exits. Set OLLAMA_MODEL env var to use a different model.
  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["ollama", "pull", "${OLLAMA_MODEL:-llama3.1:8b}"]
    volumes:
      - ollama_data:/root/.ollama
    restart: "no"

  api:
    build: .
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:8b}
      - RAG_TOP_K=${RAG_TOP_K:-3}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - API_ROOT_PATH=/api
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: on-failure

  dashboard:
    build: .
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    environment:
      - RESULTS_DIR=/app/results
    volumes:
      - ./results:/app/results
    depends_on:
      api:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Uncomment once you have a Let's Encrypt cert on the VM:
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      api:
        condition: service_healthy
      dashboard:
        condition: service_started
    restart: unless-stopped

volumes:
  ollama_data:
