upstream api {
    server api:8000;
    keepalive 32;
}

upstream dashboard {
    server dashboard:8501;
    keepalive 32;
}

server {
    listen 80;
    server_name _;          # replace _ with your domain once you have one

    client_max_body_size 10M;

    # ------------------------------------------------------------------
    # FastAPI REST API — accessible at /api/
    # nginx strips the /api prefix before forwarding to FastAPI:
    #   /api/health  ->  http://api:8000/health
    #   /api/docs    ->  http://api:8000/docs
    # FastAPI's root_path="/api" ensures Swagger UI links are correct.
    # ------------------------------------------------------------------
    location /api/ {
        proxy_pass http://api/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # /benchmark can run for many minutes — don't timeout prematurely
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ------------------------------------------------------------------
    # Streamlit WebSocket — must be declared before the / block
    # ------------------------------------------------------------------
    location /_stcore/ {
        proxy_pass http://dashboard/_stcore/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
        proxy_buffering off;
    }

    # ------------------------------------------------------------------
    # Streamlit Dashboard — everything else routes here
    # ------------------------------------------------------------------
    location / {
        proxy_pass http://dashboard/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_buffering off;
    }

    # ------------------------------------------------------------------
    # HTTPS (uncomment after running certbot on the VM)
    # ------------------------------------------------------------------
    # listen 443 ssl;
    # ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    # To enable: run certbot on the VM, uncomment the ssl_ lines above,
    # and add a redirect block:
    # server {
    #     listen 80;
    #     server_name yourdomain.com;
    #     return 301 https://$host$request_uri;
    # }
}
