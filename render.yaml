services:
  - type: web
    name: cag-vs-rag-api
    env: docker
    plan: free
    branch: main
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false          # set this manually in Render dashboard
      - key: GROQ_MODEL
        value: "llama-3.3-70b-versatile"
      - key: CF_ACCOUNT_ID
        sync: false          # set this manually in Render dashboard — used for embeddings only
      - key: CF_API_TOKEN
        sync: false          # set this manually in Render dashboard — used for embeddings only
      - key: EMBEDDING_MODEL
        value: "@cf/baai/bge-small-en-v1.5"
      - key: RAG_TOP_K
        value: "3"
      - key: MAX_TOKENS
        value: "1024"
      - key: MAX_RETRIES
        value: "3"
      - key: LOG_LEVEL
        value: "INFO"
      - key: API_ROOT_PATH
        value: ""
      - key: CORS_ORIGINS
        sync: false          # set to your Vercel URL in Render dashboard
