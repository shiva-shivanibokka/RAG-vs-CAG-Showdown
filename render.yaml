services:
  - type: web
    name: cag-vs-rag-api
    env: docker
    plan: free
    branch: main
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false          # optional server-side fallback; leave empty to require user-supplied keys
      - key: CORS_ORIGINS
        sync: false          # set to your Vercel URL, e.g. https://rag-vs-cag-showdown.vercel.app
      - key: RAG_TOP_K
        value: "5"
      - key: MAX_TOKENS
        value: "1024"
      - key: MAX_RETRIES
        value: "3"
      - key: LOG_LEVEL
        value: "INFO"
      - key: API_ROOT_PATH
        value: ""
